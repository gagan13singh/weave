<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b7cf7"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0a0a12"/>
  <!-- Left ring (white) -->
  <circle cx="12.5" cy="16" r="6" fill="none" stroke="#d0d0e0" stroke-width="2.5"/>
  <!-- Right ring (purple gradient) -->
  <circle cx="19.5" cy="16" r="6" fill="none" stroke="url(#ring)" stroke-width="2.5"/>
</svg>